<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Plus - Admin</title>
    <style>
        :root { --cyan: #00aeef; --magenta: #ec008c; --yellow: #fff200; --dark: #121212; }
        body { font-family: sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .admin-box { width: 100%; max-width: 350px; background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 20px 0; background: #000; border: 1px solid #444; color: white; border-radius: 10px; font-size: 1.2rem; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--magenta); color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; text-align: center; color: #888; }
    </style>
</head>
<body>

    <h2>laser <span style="color:var(--cyan)">plus!</span> ADMIN</h2>

    <div class="admin-box">
        <p>Cliente: <b id="client-id" style="color:var(--yellow)">Detectando...</b></p>
        <input type="number" id="sale-amount" placeholder="$ Monto de Venta">
        <button class="btn-send" onclick="sendPoints()">CARGAR PUNTOS (5%)</button>
        <div id="status">Listo para enviar</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const clientID = urlParams.get('id');
        document.getElementById('client-id').innerText = clientID || "No detectado";

        async function sendPoints() {
            const amount = parseFloat(document.getElementById('sale-amount').value);
            const status = document.getElementById('status');

            if (amount > 0 && clientID) {
                const points = Math.floor(amount * 0.05);
                status.innerText = "Enviando a la nube...";

                try {
                    // Primero creamos/actualizamos el buzón del cliente
                    await fetch('https://jsonblob.com/api/jsonBlob/' + clientID, {
                        method: 'PUT', // PUT actualiza el archivo
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({newAmount: points})
                    });

                    status.innerText = "✅ ¡Puntos enviados con éxito!";
                    document.getElementById('sale-amount').value = '';
                } catch (e) {
                    // Si el buzón no existe, intentamos crearlo con POST
                    await fetch('https://jsonblob.com/api/jsonBlob', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({newAmount: points})
                    });
                    status.innerText = "Re-intenta una vez más";
                }
            } else {
                alert("Monto inválido o falta ID de cliente");
            }
        }
    </script>
</body>
</html>
